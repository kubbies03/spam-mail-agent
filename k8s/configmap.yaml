apiVersion: v1
kind: ConfigMap
metadata:
  name: spam-agent-config
  namespace: spam-agent
data:
  APP_ENV: "prod"
  LOG_LEVEL: "INFO"
  POLL_INTERVAL_SECONDS: "60"
  MAX_CONCURRENCY: "4"
  CLASSIFIER_THRESHOLD: "0.82"
  PHISHING_ESCALATION_THRESHOLD: "0.50"
  SPAM_ESCALATION_THRESHOLD: "0.65"
  GEMINI_MODEL: "gemini-2.5-flash-lite"
  GEMINI_ENABLED: "true"
  VIRUSTOTAL_ENABLED: "true"
  # Redis: points to the redis Service in same namespace
  REDIS_URL: "redis://redis:6379/0"
  # SQLite inside the PVC (switch to postgresql+psycopg://... for Postgres)
  DATABASE_URL: "sqlite:////app/data/spam_agent.db"
  DATA_DIR: "/app/data"
  LOG_DIR: "/app/logs"
